{% extends "index.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-14 col-lg-12">
        <div class="mt-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb bg-transparent px-0">
                    <li class="breadcrumb-item"><a href="/">Главная</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Новость</li>
                </ol>
            </nav>

            <article class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5">
                    <h2 class="card-title h3 mb-4">{{ title }}</h2>
                    <div class="card-text" style="font-size: 1.1rem; line-height: 1.6;">
                        {{ text }}
                    </div>
                </div>
            </article>

            <div class="mt-4 text-center">
                <a href="/" class="btn btn-outline-secondary btn-sm">← Назад к новостям</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
