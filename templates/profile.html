{% extends "index.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm mt-4">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">Профиль</h3>
                <div class="mb-3">
                    <strong>Имя пользователя:</strong> {{ user.user_name }}
                </div>
                <div class="mb-3">
                    <strong>Email:</strong> {{ user.email }}
                </div>
                <div class="mb-4">
                    <strong>Телефон:</strong> {{ user.phone_number or 'не указан' }}
                </div>
                <div class="d-flex flex-column gap-2">
                    <p><a class="btn btn-outline-secondary" href="/">На главную</a></p>
                    <p><a class="btn btn-outline-secondary" href="/edit_profile">Редактировать профиль</a></p>
                    <p><a class="btn btn-outline-secondary" href="/logout">Выйти</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
